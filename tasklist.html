<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .app {
        width: 380px;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        padding: 25px;
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
        color: white;
      }

      h1 {
        text-align: center;
        margin-bottom: 20px;
        font-size: 28px;
        letter-spacing: 1px;
      }

      .input-box {
        display: flex;
        gap: 10px;
      }

      input {
        flex: 1;
        padding: 12px;
        border-radius: 12px;
        border: none;
        outline: none;
        font-size: 14px;
      }

      input:focus {
        box-shadow: 0 0 10px rgba(255, 255, 255, 0.4);
      }

      button {
        padding: 12px 16px;
        border: none;
        border-radius: 12px;
        background: #00c6ff;
        background: linear-gradient(45deg, #00c6ff, #0072ff);
        color: white;
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s;
      }

      button:hover {
        transform: scale(1.05);
      }

      ul {
        list-style: none;
        padding: 0;
        margin-top: 20px;
      }

      li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: rgba(255, 255, 255, 0.2);
        padding: 12px;
        border-radius: 12px;
        margin-bottom: 10px;
        transition: 0.3s;
      }

      li:hover {
        transform: translateX(5px);
        background: rgba(255, 255, 255, 0.3);
      }

      .left {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .left span {
        cursor: pointer;
      }

      .done span {
        text-decoration: line-through;
        opacity: 0.5;
      }

      .actions button {
        background: rgba(255, 255, 255, 0.3);
        padding: 6px 10px;
        font-size: 12px;
      }

      .actions button:hover {
        background: rgba(255, 255, 255, 0.5);
      }
      ul::-webkit-scrollbar {
        width: 6px;
      }

      ul::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.4);
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <h1>Task Manager</h1>

      <div class="input-box">
        <input type="text" id="input" placeholder="Enter task..." />
        <button onclick="addTask()">Add</button>
      </div>

      <!-- FILTER BUTTONS -->
      <div class="filters">
        <br />
        <button onclick="setFilter('all')">All</button>
        <button onclick="setFilter('active')">Active</button>
        <button onclick="setFilter('completed')">Completed</button>
      </div>

      <ul id="list"></ul>
    </div>
    <script src="tasklist.js"></script>
  </body>
</html>
