<!doctype html>
<html lang="en">
  <head>
    <title>Document</title>
  </head>
  <body>
    <script>
      let n = prompt("Enter factorial value Here");
      if (n === null) {
        document.write("Don't Enter null Value");
      } else {
        if (isNaN(n)) {
          document.write("Enter a Number");
        } else {
          let fact = 1;
          for (let i = 1; i <= n; i++) {
            fact = fact * i;
          }
          document.write(fact);
        }
      }
    </script>
  </body>
</html>
