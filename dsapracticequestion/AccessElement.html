<html lang="en">

  <body>
    <input placeholder="Enter position value here" id="inv" />
    <button onclick="getallValue()">Enter Here</button>
    <script>
      function getallValue() {
        let data = [10, 20, 30, 40, 50];

          console.log(data[position]);

          console.log("It is unvalid");
        }
      }
    </script>
